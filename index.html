<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Live Scoreboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <div class="logo">ANTIGRAVITY <span class="highlight">SPORTS</span></div>
        <div class="nav-links">
            <a href="events.html" class="nav-link">Event Winners</a>
            <a href="login.html" class="nav-btn">Admin Login</a>
        </div>
    </nav>

    <main class="dashboard-container">
        
        <header class="dashboard-header">
            <h1>Live Leaderboard</h1>
            <p>Real-time scores and rankings for all houses</p>
        </header>

        <section class="content-grid">
            
            <!-- Leaderboard Cards -->
            <div class="ranking-panel">
                <h2>Current Standings</h2>
                <div id="leaderboard" class="cards-container">
                    <!-- Cards injected by JS -->
                </div>
            </div>

            <!-- Analytics Chart -->
            <div class="chart-panel">
                <h2>Score Overview</h2>
                <div class="chart-container">
                    <canvas id="scoreChart"></canvas>
                </div>
            </div>

        </section>

    </main>

    <footer style="text-align: center; margin-top: 2rem; color: rgba(255, 255, 255, 0.5);">
        <p>Done by 3rd CSE.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Initialize dashboard view
        document.addEventListener('DOMContentLoaded', () => {
            showLeaderboard();
            initChart();
            
            // Listen for storage changes from other tabs (Admin panel)
            window.addEventListener('storage', () => {
                showLeaderboard();
                updateChart();
            });
        });
    </script>
</body>
</html>
