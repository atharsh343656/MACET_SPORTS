<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Winners - Antigravity Sports</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <div class="logo">ANTIGRAVITY <span class="highlight">SPORTS</span></div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Main Leaderboard</a>
            <a href="login.html" class="nav-btn">Admin Login</a>
        </div>
    </nav>

    <main class="dashboard-container">
        
        <header class="dashboard-header text-center">
            <h1>Event Winners</h1>
            <p>Results across all 35 sports events</p>
        </header>

        <section class="events-grid" id="eventsContainer">
            <!-- Event cards injected by JS -->
        </section>

    </main>

    <footer style="text-align: center; margin-top: 2rem; margin-bottom: 2rem; color: rgba(255, 255, 255, 0.5);">
        <p>Done by 3rd CSE.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderEvents();
            
            // Listen for changes from Admin
            window.addEventListener('storage', () => {
                renderEvents();
            });
        });
    </script>
</body>
</html>
